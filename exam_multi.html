<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Multimedia Exam — CH0–CH7 Complete | Final Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#060f0a; --deep:#091408; --mid:#0e2016;
  --card:rgba(14,32,22,.65); --border:rgba(45,255,127,.15);
  --accent:#2dff7f; --accent2:#ff6b35; --gold:#ffc940;
  --teal:#00ffd0; --red:#ff5f6d; --purple:#b48aff;
  --green:#2dff7f; --text:#d0eedd; --muted:#5a8a6a;
  --hi:rgba(45,255,127,.07);
  --ar-bg:rgba(255,201,64,.05); --ar-border:rgba(255,201,64,.25);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:Cairo,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;overflow-x:hidden}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.6}

/* NAV */
.top-nav{position:sticky;top:0;z-index:999;background:rgba(6,15,10,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.top-nav a{text-decoration:none;color:var(--text);border:1px solid var(--border);background:rgba(14,32,22,.75);padding:6px 13px;border-radius:9px;font-size:12.5px;font-weight:700;transition:.2s;white-space:nowrap}
.top-nav a:hover,.top-nav a.active{color:var(--bg);background:var(--accent);border-color:var(--accent);box-shadow:0 0 14px rgba(45,255,127,.4)}

/* HERO */
.hero{position:relative;z-index:1;padding:60px 24px 44px;text-align:center;border-bottom:1px solid var(--border);background:linear-gradient(160deg,#060f0a,#091408 50%,#0a1f0d)}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 0%,rgba(45,255,127,.13),transparent 70%);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--accent);color:var(--accent);font-size:11px;font-weight:700;letter-spacing:2px;padding:5px 20px;border-radius:30px;margin-bottom:18px;text-transform:uppercase;background:rgba(45,255,127,.07)}
.dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}
.hero h1{font-family:Syne,sans-serif;font-size:clamp(1.9rem,5vw,3.2rem);font-weight:800;color:#fff;letter-spacing:-1px;margin-bottom:8px}
.hero h1 span{color:var(--accent)}
.hero .ar-sub{color:var(--gold);font-size:1rem;margin-bottom:10px;font-family:Cairo,sans-serif}

/* SCOREBOARD */
.scoreboard{position:relative;z-index:1;max-width:900px;margin:28px auto 0;padding:0 20px}
.score-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px 28px;backdrop-filter:blur(10px);display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.score-ring{position:relative;width:110px;height:110px;flex-shrink:0}
.score-ring svg{transform:rotate(-90deg);width:110px;height:110px}
.score-ring .track{fill:none;stroke:rgba(45,255,127,.1);stroke-width:8}
.score-ring .fill{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s ease;stroke-dasharray:283;stroke-dashoffset:283}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-pct{font-family:Syne,sans-serif;font-size:1.5rem;font-weight:800;color:#fff}
.score-label{font-size:10px;color:var(--muted)}
.score-stats{display:flex;gap:20px;flex-wrap:wrap;flex:1}
.stat-item{text-align:center}
.stat-item .val{font-family:Syne,sans-serif;font-size:1.8rem;font-weight:800;line-height:1}
.stat-item .lbl{font-size:11px;color:var(--muted)}
.val.correct{color:var(--green)}
.val.wrong{color:var(--red)}
.val.skip{color:var(--gold)}
.val.total{color:var(--accent)}
.progress-bar{height:6px;background:rgba(45,255,127,.1);border-radius:10px;margin-top:16px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--teal));border-radius:10px;transition:width .5s ease;width:0%}
.score-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.btn{padding:9px 22px;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;border:none;font-family:Cairo,sans-serif;transition:.2s}
.btn-accent{background:var(--accent);color:var(--bg)}
.btn-accent:hover{box-shadow:0 4px 20px rgba(45,255,127,.4);transform:translateY(-2px)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-red{background:rgba(255,95,109,.15);border:1px solid rgba(255,95,109,.4);color:var(--red)}
.btn-red:hover{background:rgba(255,95,109,.25)}

/* FILTERS */
.filters{position:relative;z-index:1;max-width:900px;margin:18px auto 0;padding:0 20px;display:flex;gap:9px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:6px 15px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:rgba(14,32,22,.7);color:var(--muted);font-family:Cairo,sans-serif;transition:.2s}
.filter-btn.active{background:rgba(45,255,127,.12);border-color:var(--accent);color:var(--accent)}
.chapter-filter{padding:6px 13px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:rgba(14,32,22,.7);color:var(--text);font-family:Cairo,sans-serif;outline:none}
.chapter-filter:focus{border-color:var(--accent)}
.search-box{flex:1;min-width:180px;background:rgba(14,32,22,.7);border:1px solid var(--border);border-radius:8px;padding:7px 14px;color:var(--text);font-family:Cairo,sans-serif;font-size:13px;outline:none}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--muted)}

/* CHAPTER DIVIDER */
.ch-divider{margin:28px 0 4px}
.ch-header{display:flex;align-items:center;gap:12px;padding:14px 20px;background:linear-gradient(90deg,rgba(45,255,127,.1),rgba(45,255,127,.02));border:1px solid rgba(45,255,127,.2);border-radius:14px;margin-bottom:4px}
.ch-icon{width:40px;height:40px;border-radius:10px;background:rgba(45,255,127,.15);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ch-title{font-family:Syne,sans-serif;font-weight:800;color:#fff;font-size:1.05rem}
.ch-sub{font-size:12px;color:var(--muted);margin-top:2px}
.ch-count{margin-left:auto;background:rgba(45,255,127,.1);border:1px solid rgba(45,255,127,.2);color:var(--accent);font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px}

/* QUESTIONS */
.questions-wrap{position:relative;z-index:1;max-width:900px;margin:8px auto 60px;padding:0 20px}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px 24px;margin-bottom:14px;backdrop-filter:blur(6px);transition:.3s;animation:fadeUp .5s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.q-card.answered-correct{border-color:rgba(45,255,127,.4);background:rgba(45,255,127,.04)}
.q-card.answered-wrong{border-color:rgba(255,95,109,.4);background:rgba(255,95,109,.04)}
.q-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px}
.q-num{width:38px;height:38px;background:var(--accent);color:var(--bg);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0;font-family:Syne,sans-serif}
.q-num.correct-num{background:var(--green)}
.q-num.wrong-num{background:var(--red)}
.q-type-tag{font-size:10px;font-weight:700;color:var(--purple);background:rgba(180,138,255,.1);border:1px solid rgba(180,138,255,.2);padding:2px 8px;border-radius:5px;margin-bottom:4px;display:inline-block;margin-right:6px}
.q-chapter-tag{font-size:10px;font-weight:700;color:var(--accent);background:rgba(45,255,127,.08);border:1px solid rgba(45,255,127,.2);padding:2px 8px;border-radius:5px;margin-bottom:4px;display:inline-block}
.q-text{font-size:14.5px;font-weight:600;color:#fff;line-height:1.65;flex:1}
.options{display:flex;flex-direction:column;gap:8px}
.option{display:flex;align-items:center;gap:12px;padding:11px 16px;background:rgba(14,32,22,.5);border:1px solid rgba(45,255,127,.1);border-radius:10px;cursor:pointer;transition:.2s;font-size:13.5px;direction:ltr}
.option:hover:not(.disabled){background:rgba(45,255,127,.08);border-color:rgba(45,255,127,.3);transform:translateX(3px)}
.option.disabled{cursor:default}
.option-letter{width:28px;height:28px;border-radius:7px;background:rgba(45,255,127,.08);border:1px solid rgba(45,255,127,.2);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:var(--accent);flex-shrink:0;font-family:Syne,sans-serif;transition:.2s}
.option.selected .option-letter{background:var(--accent);color:var(--bg)}
.option.correct-opt{background:rgba(45,255,127,.1)!important;border-color:rgba(45,255,127,.45)!important}
.option.correct-opt .option-letter{background:var(--green);color:var(--bg)}
.option.wrong-opt{background:rgba(255,95,109,.1)!important;border-color:rgba(255,95,109,.4)!important}
.option.wrong-opt .option-letter{background:var(--red);color:#fff}
.option.show-correct{background:rgba(45,255,127,.08)!important;border-color:rgba(45,255,127,.35)!important;animation:pulse-border .8s ease}
.option.show-correct .option-letter{background:var(--green);color:var(--bg)}
@keyframes pulse-border{0%,100%{box-shadow:none}50%{box-shadow:0 0 14px rgba(45,255,127,.4)}}

/* FEEDBACK */
.feedback{margin-top:14px;border-radius:12px;padding:16px 18px;font-size:13.5px;line-height:1.75;display:none}
.feedback.show{display:block;animation:fadeUp .4s ease}
.feedback.correct-fb{background:rgba(45,255,127,.06);border:1px solid rgba(45,255,127,.3)}
.feedback.wrong-fb{background:rgba(255,95,109,.06);border:1px solid rgba(255,95,109,.3)}
.fb-header{font-weight:800;font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.fb-correct-head{color:var(--green)}
.fb-wrong-head{color:var(--red)}
.fb-correct-ans{margin-top:8px;background:rgba(45,255,127,.1);border:1px solid rgba(45,255,127,.2);border-radius:8px;padding:9px 13px;font-weight:700;color:var(--green);font-size:13.5px}
.fb-en{color:var(--text);margin-top:8px;font-size:13px;line-height:1.7}
.fb-ar{background:rgba(255,201,64,.05);border:1px solid rgba(255,201,64,.2);border-right:3px solid var(--gold);border-radius:0 8px 8px 0;padding:9px 13px;margin-top:8px;direction:rtl;text-align:right;font-size:13px;color:#d4c070;line-height:1.8}
.fb-ar-lbl{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;direction:ltr;text-align:left}

/* TRUE/FALSE badge */
.tf-badge{display:inline-block;padding:2px 10px;border-radius:5px;font-size:11px;font-weight:700;margin-right:6px}
.tf-t{background:rgba(45,255,127,.12);color:var(--green);border:1px solid rgba(45,255,127,.25)}
.tf-f{background:rgba(255,95,109,.1);color:var(--red);border:1px solid rgba(255,95,109,.25)}

/* PROBLEM SOLVING */
.prob-card{background:linear-gradient(135deg,rgba(0,255,208,.04),rgba(14,32,22,.7));border:1px solid rgba(0,255,208,.25);border-radius:18px;padding:22px 24px;margin-bottom:14px;backdrop-filter:blur(6px);animation:fadeUp .5s ease both}
.prob-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.prob-num{width:38px;height:38px;background:var(--teal);color:var(--bg);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0;font-family:Syne,sans-serif}
.prob-type-tag{font-size:10px;font-weight:700;color:var(--teal);background:rgba(0,255,208,.1);border:1px solid rgba(0,255,208,.25);padding:2px 8px;border-radius:5px;margin-bottom:4px;display:inline-block;margin-right:6px}
.prob-q{font-size:14.5px;font-weight:600;color:#fff;line-height:1.65;flex:1}
.prob-toggle{margin-top:12px;background:rgba(0,255,208,.08);border:1px solid rgba(0,255,208,.2);color:var(--teal);padding:9px 18px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif;transition:.2s;width:100%;text-align:left}
.prob-toggle:hover{background:rgba(0,255,208,.15);box-shadow:0 0 12px rgba(0,255,208,.2)}
.prob-solution{display:none;margin-top:12px;border-radius:12px;overflow:hidden}
.prob-solution.show{display:block;animation:fadeUp .35s ease}
.prob-sol-body{background:rgba(0,255,208,.05);border:1px solid rgba(0,255,208,.2);border-radius:12px;padding:16px 18px;font-size:13.5px;line-height:1.85;color:var(--text)}
.prob-sol-body .sol-label{font-family:Syne,sans-serif;font-size:12px;font-weight:800;color:var(--teal);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.prob-sol-body .sol-en{color:var(--text);white-space:pre-line}
.prob-sol-body .sol-ar{background:rgba(255,201,64,.05);border:1px solid rgba(255,201,64,.2);border-right:3px solid var(--gold);border-radius:0 8px 8px 0;padding:10px 13px;margin-top:10px;direction:rtl;text-align:right;font-size:13px;color:#d4c070;line-height:1.9;white-space:pre-line}
.prob-sol-body .sol-ar-lbl{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;direction:ltr;text-align:left}

/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .big{font-size:3rem;margin-bottom:12px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:.3s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--deep);border:1px solid var(--border);border-radius:24px;padding:36px;max-width:460px;width:100%;text-align:center;transform:scale(.9);transition:.3s;position:relative}
.modal-overlay.show .modal{transform:scale(1)}
.modal h2{font-family:Syne,sans-serif;font-size:1.8rem;color:#fff;margin-bottom:6px}
.modal .grade{font-size:4rem;font-weight:900;font-family:Syne,sans-serif;margin:16px 0}
.modal .grade.A{color:var(--green)}
.modal .grade.B{color:var(--accent)}
.modal .grade.C{color:var(--gold)}
.modal .grade.D{color:var(--red)}
.modal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:20px 0}
.modal-stat{background:rgba(14,32,22,.8);border:1px solid var(--border);border-radius:12px;padding:14px}
.modal-stat .ms-val{font-family:Syne,sans-serif;font-size:1.5rem;font-weight:800}
.modal-stat .ms-lbl{font-size:11px;color:var(--muted)}
.modal-msg{font-size:14px;color:var(--muted);margin-bottom:24px;direction:rtl;font-family:Cairo,sans-serif}

/* MINI SCORE */
.mini-score{position:fixed;bottom:20px;right:20px;z-index:500;background:rgba(6,15,10,.96);border:1px solid var(--border);border-radius:14px;padding:10px 16px;backdrop-filter:blur(10px);display:flex;gap:14px;align-items:center;font-size:13px}
.ms-c{color:var(--green);font-weight:800}
.ms-w{color:var(--red);font-weight:800}
.ms-t{color:var(--muted)}

@media(max-width:600px){.score-card{flex-direction:column;text-align:center}.score-stats{justify-content:center}.hero h1{font-size:1.9rem}}
</style>
</head>

<canvas id="bg-canvas"></canvas>

<!-- NAV -->

<nav class="top-nav">

<!-- HERO -->
<section class="hero">
  <div class="hero-badge"><span class="dot"></span> Final Exam Prep — CH0 to CH7</div>
  <h1>Multimedia <span>Exam Bank</span></h1>
  <div class="ar-sub" style="font-family:Cairo,sans-serif">197 سؤال — CH0 حتى CH7 — MCQ + True/False + Problem Solving</div>
</section>

<!-- SCOREBOARD -->
<div class="scoreboard">
  <div class="score-card">

      <svg viewBox="0 0 100 100">
        <circle class="track" cx="50" cy="50" r="45"/>
        <circle class="fill" id="ringFill" cx="50" cy="50" r="45"/>
      </svg>

        <span class="score-pct" id="scorePct">0%</span>

      </div>

      <div class="stat-item"><div class="val correct" id="countCorrect">0</div><div class="lbl">✅ Correct</div></div>

      <div class="stat-item"><div class="val skip" id="countSkip">0</div><div class="lbl">⏳ Left</div></div>
      <div class="stat-item"><div class="val total" id="countTotal">0</div><div class="lbl">📊 Total</div></div>

    <div style="flex-basis:100%">
      <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
      <div class="score-actions">
        <button class="btn btn-accent" onclick="showResults()">📊 Show Results</button>

</div>

<!-- FILTERS -->
<div class="filters">

  </select>
  <input type="text" class="search-box" placeholder="🔍 Search questions..." oninput="searchQ(this.value)"/>
</div>

<!-- QUESTIONS CONTAINER -->

<!-- MINI SCORE -->

</div>

<!-- RESULTS MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div id="modalEmoji" style="font-size:3rem;margin-bottom:8px">🎯</div>
    <h2>Your Result</h2>
    <div class="grade A" id="modalGrade">0%</div>
    <div class="modal-stats">
      <div class="modal-stat"><div class="ms-val" style="color:var(--green)" id="mCorrect">0</div><div class="ms-lbl">Correct ✅</div></div>
      <div class="modal-stat"><div class="ms-val" style="color:var(--red)" id="mWrong">0</div><div class="ms-lbl">Wrong ❌</div></div>

    </div>
    <div class="modal-msg" id="modalMsg"></div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-accent" onclick="closeModal()">Close</button>
      <button class="btn btn-red" onclick="closeModal();resetAll()">🔄 Retry</button>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [
// ══════════════════════════════════════════
// CHAPTER 0 — Introduction to Multimedia
// ══════════════════════════════════════════
{id:1,ch:'CH0',type:'MCQ',
 q:'What does HTTP stand for?',
 opts:['HyperText Transfer Protocol','High Transfer Text Protocol','HyperText Transport Program','Host Transfer Text Protocol'],

{id:101,ch:'CH5',type:'MCQ',
 q:'What is a typeface?',

 ans:1,
 en:'A typeface (e.g. Arial, Times) is a whole family of graphic characters including many sizes and styles. A font is one specific member of that family (e.g. Arial Bold 12pt).',
 ar:'الـ Typeface (مثل Arial، Times) هو عائلة كاملة من الأحرف تشمل أحجاماً وأساليب مختلفة. الـ Font هو فرد واحد محدد من تلك العائلة.'},

{id:102,ch:'CH5',type:'MCQ',
 q:'Font sizes are measured in:',
 opts:['Pixels','Inches','Points','Centimetres'],

{id:103,ch:'CH5',type:'MCQ',
 q:'Which term describes the space adjustment between pairs of letters?',
 opts:['Leading','Kerning','Tracking','Hinting'],
 ans:1,
 en:'Kerning adjusts the horizontal space between specific letter pairs to improve visual appearance (e.g. the letters AV naturally look too spaced apart).',
 ar:'الـ Kerning يضبط المسافة الأفقية بين زوج محدد من الأحرف لتحسين المظهر البصري (مثلاً: الأحرف AV تبدو بعيدة بصرياً).'},

{id:104,ch:'CH5',type:'MCQ',
 q:'What is "leading" in typography?',

 en:'Leading (pronounced "ledding") is the vertical spacing between lines of text. More leading = more breathing room between lines.',

{id:105,ch:'CH5',type:'MCQ',

{id:106,ch:'CH5',type:'MCQ',

{id:109,ch:'CH5',type:'MCQ',

 ans:1,
 en:'Font substitution occurs when a document is opened on a machine that lacks the original font — the OS uses a similar available font instead.',
 ar:'استبدال الخط يحدث عندما تُفتح وثيقة على جهاز لا يحتوي على الخط الأصلي — يستبدل نظام التشغيل خطاً مشابهاً متاحاً.'},

{id:110,ch:'CH5',type:'MCQ',
 q:'Which HTML tag specifies the font to display?',
 opts:['<text>','<font>','<style>','<typeface>'],
 ans:1,
 en:'The HTML <font> tag specifies the typeface to display. If the font is unavailable on the user\'s machine, the browser uses its default font.',
 ar:'الوسم HTML <font> يُحدد الخط المراد عرضه. إن لم يكن موجوداً، يستخدم المتصفح الخط الافتراضي.'},

{id:111,ch:'CH5',type:'MCQ',
 q:'The "X-height" of a font refers to:',
 opts:['The height of capital letters','The height of the lowercase letter x','The spacing between lines','The point size of the font'],
 ans:1,
 en:'X-height is the height of the lowercase letter "x" and is a key measure for determining the visual size of a font at a given point size.',
 ar:'X-height هو ارتفاع الحرف الصغير "x" — مقياس أساسي لتحديد الحجم البصري للخط عند حجم نقطة معين.'},

{id:112,ch:'CH5',type:'MCQ',
 q:'What does anti-aliasing do to on-screen text?',
 opts:['Removes all colors from text','Blends edge pixels to create smoother letter outlines','Converts text to bitmapped format','Automatically increases kerning'],
 ans:1,
 en:'Anti-aliasing blends intermediate-color pixels along letter edges, reducing the jagged staircase effect and creating smoother outlines on screen.',
 ar:'الـ Anti-aliasing يمزج بيكسلات اللون الوسيط على أطراف الأحرف للتقليل من التأثير المتدرج الخشن وإنشاء مخططات أكثر نعومة.'},

{id:113,ch:'CH5',type:'MCQ',
 q:'In hypermedia, what is a "node"?',
 opts:['A navigation button','A content element (text, graphics, sounds) linked to other nodes','A broken hyperlink','A CSS styling rule'],
 ans:1,
 en:'A node is any content element (text, graphics, sound) in a hypermedia system that is connected to other nodes via links.',
 ar:'الـ Node هو أي عنصر محتوى (نص، رسوميات، صوت) في نظام Hypermedia مرتبط بعقد أخرى عبر روابط.'},

{id:114,ch:'CH5',type:'MCQ',
 q:'Who coined the term "hypertext"?',
 opts:['Tim Berners-Lee','Doug Engelbart','Ted Nelson','Johann Gutenberg'],
 ans:2,
 en:'Ted Nelson coined the term "hypertext" in 1965, envisioning linked text systems that would fundamentally change how humans think and access information.',
 ar:'Ted Nelson ابتكر مصطلح "hypertext" عام 1965، متصوراً أنظمة نص مرتبطة ستغيّر أساسياً طريقة تفكير البشر والوصول إلى المعلومات.'},

{id:115,ch:'CH5',type:'MCQ',
 q:'What is "localization" of text?',
 opts:['Converting fonts to bitmap format','Translating and adapting content for a specific language or culture','Reducing font file sizes','Applying regional color palettes'],
 ans:1,
 en:'Localization adapts content — translation, cultural adjustments, date formats, etc. — for a specific language or regional audience.',
 ar:'الـ Localization يُكيِّف المحتوى — الترجمة والتعديلات الثقافية وصيغ التاريخ إلخ — للغة أو المنطقة المحددة.'},

{id:116,ch:'CH5',type:'MCQ',
 q:'A Boolean search in hypertext uses which operators?',
 opts:['PLUS, MINUS, EQUALS','AND, OR, NOT','FIND, REPLACE, SEARCH','IF, THEN, ELSE'],
 ans:1,
 en:'Boolean operators AND, OR, NOT allow combining or excluding search terms for precise information retrieval in hypertext systems.',
 ar:'عمليات Boolean (AND, OR, NOT) تُمكِّن من جمع مصطلحات البحث أو استثنائها للحصول على نتائج دقيقة.'},

{id:117,ch:'CH5',type:'MCQ',
 q:'Monitor landscape orientation means the display is:',
 opts:['Taller than wide','Wider than tall','Square shaped','Rotated 90 degrees'],
 ans:1,
 en:'Landscape = wider than tall (horizontal). Portrait = taller than wide (vertical). Monitors default to landscape orientation.',
 ar:'الـ Landscape = العرض أكثر من الارتفاع (أفقي). الـ Portrait = الارتفاع أكثر من العرض (رأسي). الشاشات تفضل Landscape.'},

{id:118,ch:'CH5',type:'MCQ',
 q:'What is "ransom-note typography"?',
 opts:['Using hidden text in a document','Using too many different typefaces in one design','Displaying text in a threatening font','Applying excessive kerning'],
 ans:1,
 en:'Using too many typefaces in one project produces a chaotic, unprofessional look nicknamed "ransom-note typography".',
 ar:'استخدام عدد كبير جداً من الخطوط المختلفة في مشروع واحد ينتج مظهراً فوضوياً غير احترافي يُعرف بـ "ransom-note typography".'},

{id:119,ch:'CH5',type:'MCQ',
 q:'PostScript fonts describe characters using:',
 opts:['Pixel grids','Bezier curves','Raster maps','ASCII codes'],
 ans:1,
 en:'PostScript (developed by Apple & Adobe) describes font outlines as mathematical Bezier curves, enabling smooth scaling to any size.',
 ar:'PostScript (طوّرته Apple وAdobe) يصف مخططات الخطوط بمنحنيات Bezier الرياضية، مما يسمح بتوسيعها بسلاسة لأي حجم.'},

{id:120,ch:'CH5',type:'MCQ',
 q:'Reading text on a computer screen is slower than from a book partly because:',
 opts:['Screens use serif fonts only','Eye blinking drops from 20-25 to only 3-5 times per minute','Screen resolution is always lower than print','WYSIWYG forces slower rendering'],
 ans:1,
 en:'When using a computer screen, the blink rate drops dramatically (3-5/min vs 20-25/min when reading a book), causing eye fatigue and dryness.',
 ar:'عند استخدام الشاشة، ينخفض معدل الرف بشكل كبير (3-5 مرات/دقيقة مقارنةً بـ 20-25 عند قراءة كتاب)، مما يسبب تعب العين.'},

// CH5 True/False
{id:121,ch:'CH5',type:'TF',
 q:'A font and a typeface refer to the same thing.',
 opts:['True','False'],
 ans:1,
 en:'FALSE — A typeface is the family (e.g. Arial); a font is one specific size and style within that family (e.g. Arial Bold 12pt). They are different concepts.',
 ar:'خطأ — الـ Typeface هو العائلة (مثل Arial)؛ الـ Font هو الحجم والأسلوب المحدد داخل تلك العائلة (مثل Arial Bold 12pt). مفهومان مختلفان.'},

{id:122,ch:'CH5',type:'TF',
 q:'TrueType fonts can be scaled to any size without jagged edges.',
 opts:['True','False'],
 ans:0,
 en:'TRUE — TrueType fonts use mathematical outlines and anti-aliasing, rendering smoothly at any size without pixelation or jagged edges.',
 ar:'صحيح — خطوط TrueType تستخدم مخططات رياضية وanti-aliasing، فتُرسم بسلاسة بأي حجم دون تشويه أو حواف خشنة.'},

{id:123,ch:'CH5',type:'TF',
 q:'UNICODE was developed before the ASCII character set.',
 opts:['True','False'],
 ans:1,
 en:'FALSE — ASCII dates to the 1960s; UNICODE was developed in 1989 to handle multilingual text. ASCII came first.',
 ar:'خطأ — ASCII يعود إلى ستينيات القرن العشرين؛ UNICODE طُوِّر عام 1989. ASCII جاء أولاً.'},

{id:124,ch:'CH5',type:'TF',
 q:'Leading refers to the horizontal space between individual letter pairs.',
 opts:['True','False'],
 ans:1,
 en:'FALSE — Leading is VERTICAL line spacing between rows of text. Kerning is the HORIZONTAL space between specific letter pairs.',
 ar:'خطأ — الـ Leading هو المسافة الرأسية بين الأسطر. الـ Kerning هو المسافة الأفقية بين زوج محدد من الأحرف.'},

{id:125,ch:'CH5',type:'TF',
 q:'A hyperlink anchor is the reference point of origin in a document.',
 opts:['True','False'],
 ans:0,
 en:'TRUE — The anchor marks the source reference point in a document that links to another document, image, or file.',
 ar:'صحيح — الـ Anchor يُحدد نقطة المصدر في وثيقة مرتبطة بوثيقة أخرى أو صورة أو ملف.'},

{id:126,ch:'CH5',type:'TF',
 q:'Bitmapped fonts can be enlarged without any quality loss.',
 opts:['True','False'],
 ans:1,
 en:'FALSE — Bitmapped fonts are stored as fixed pixel grids; enlarging them causes visible jagged edges (staircase effect).',
 ar:'خطأ — الخطوط الـ Bitmap مخزونة كشبكة نقاط ثابتة؛ تكبيرها يُسبب حوافاً خشنة مرئية (تأثير السلم).'},

{id:127,ch:'CH5',type:'TF',
 q:'HTML was originally designed to handle multimedia as well as text.',
 opts:['True','False'],
 ans:1,
 en:'FALSE — HTML was originally designed for text only; multimedia support was added later through extensions like DHTML, CSS, and HTML5.',
 ar:'خطأ — HTML صُمِّم أصلاً للنص فقط؛ دعم الوسائط المتعددة أُضيف لاحقاً عبر امتدادات مثل DHTML وCSS وHTML5.'},

{id:128,ch:'CH5',type:'TF',
 q:'A sans-serif font has small decorative strokes at the ends of letters.',
 opts:['True','False'],
 ans:1,
 en:'FALSE — "Sans" means "without". Sans-serif fonts (e.g. Arial) deliberately LACK those decorative strokes. Serif fonts (e.g. Times) have them.',
 ar:'خطأ — "Sans" تعني "بلا". خطوط Sans-serif (مثل Arial) تخلو عمداً من الزخرفة. خطوط Serif (مثل Times) تمتلكها.'},

{id:129,ch:'CH5',type:'TF',
 q:'Intercap notation (e.g. LastName) is used to improve readability of compound words.',
 opts:['True','False'],
 ans:0,
 en:'TRUE — Capitalizing each component\'s first letter in a compound technical term (e.g. UserProfile) improves readability where spaces are not allowed.',
 ar:'صحيح — تكبير الحرف الأول لكل جزء في المصطلحات التقنية المركبة (مثل UserProfile) يُحسِّن القراءة حيث لا تُسمح المسافات.'},

{id:130,ch:'CH5',type:'TF',
 q:'Fontographer can be used to create PostScript, TrueType, and bitmapped fonts.',
 opts:['True','False'],
 ans:0,
 en:'TRUE — Fontographer (Macromedia) is a professional font editing tool capable of creating all three major font formats: PostScript, TrueType, and Bitmapped.',
 ar:'صحيح — Fontographer (Macromedia) أداة تحرير خطوط احترافية قادرة على إنشاء الأنواع الثلاثة الرئيسية: PostScript وTrueType وBitmapped.'},

// ══════════════════════════════════════════════════════════
// CHAPTER 6 — Sound in Multimedia
// Topics: Acoustics, MIDI, Digital Audio, Sampling, File Formats, Copyright
// ══════════════════════════════════════════════════════════
{id:131,ch:'CH6',type:'MCQ',
 q:'What is "acoustics"?',
 opts:['The study of light and optics','The branch of physics that studies sound','The measurement of file compression','A type of audio format'],
 ans:1,
 en:'Acoustics is the branch of physics dedicated to studying sound — its production, propagation, and effects on matter.',
 ar:'علم الصوتيات (Acoustics) هو فرع الفيزياء المخصص لدراسة الصوت — إنتاجه وانتشاره وآثاره.'},

{id:132,ch:'CH6',type:'MCQ',
 q:'Sound pressure level (loudness) is measured in:',
 opts:['Hertz (Hz)','Decibels (dB)','Kilohertz (kHz)','Watts'],
 ans:1,
 en:'Decibels (dB) measure sound intensity/loudness. Frequency (pitch) is separately measured in Hertz (Hz).',
 ar:'الديسيبل (dB) يقيس شدة الصوت. التردد (النغمة) يُقاس بالهيرتز (Hz) بشكل منفصل.'},

{id:133,ch:'CH6',type:'MCQ',
 q:'The human audible frequency range is:',
 opts:['0 – 20 Hz','20 Hz – 20 kHz','20 kHz – 1 GHz','1 GHz – 10 THz'],
 ans:1,
 en:'Humans hear between 20 Hz (deep bass) and 20,000 Hz (20 kHz, very high treble). Below 20 Hz = infrasound; above 20 kHz = ultrasound.',
 ar:'يسمع الإنسان بين 20 Hz (باص عميق) و20,000 Hz (20 kHz، تربيل عالٍ جداً). أقل من 20 Hz = Infrasound؛ أعلى من 20 kHz = Ultrasound.'},

{id:134,ch:'CH6',type:'MCQ',
 q:'MIDI stands for:',
 opts:['Multiple Instrument Digital Integration','Musical Instrument Digital Interface','Multimedia Input Device Interface','Music and Image Digital Interchange'],
 ans:1,
 en:'MIDI = Musical Instrument Digital Interface. A 1980s communications standard allowing electronic musical instruments and computers to communicate.',
 ar:'MIDI = واجهة الآلة الموسيقية الرقمية. معيار اتصالات من الثمانينيات يتيح للآلات الإلكترونية والحاسبات التواصل.'},

{id:135,ch:'CH6',type:'MCQ',
 q:'MIDI data is best described as:',
 opts:['A digital recording of actual sound waves','A numeric shorthand storing musical instructions','A compressed waveform','A sampled stereo recording'],
 ans:1,
 en:'MIDI stores musical instructions (notes, duration, velocity) as numbers — like sheet music in numeric form — NOT actual recorded sound.',
 ar:'MIDI يخزن التعليمات الموسيقية (النوتات، المدة، السرعة) كأرقام — مثل النوتة الموسيقية بصيغة رقمية — وليس تسجيلاً صوتياً فعلياً.'},

{id:136,ch:'CH6',type:'MCQ',
 q:'Digital audio sampling rate is measured in:',
 opts:['Decibels','Bits per sample','Kilohertz (kHz)','Megabytes'],
 ans:2,
 en:'Sampling rate (number of samples taken per second) is measured in kHz. CD quality = 44.1 kHz (44,100 samples per second).',
 ar:'معدل أخذ العينات (القياسات في الثانية) يُقاس بالكيلوهيرتز. جودة CD = 44.1 kHz (44,100 عينة في الثانية).'},

{id:137,ch:'CH6',type:'MCQ',
 q:'Which is a key ADVANTAGE of MIDI over digital audio?',
 opts:['Consistent playback on any device','Ability to reproduce spoken dialog','Much smaller file sizes','Device-independent playback'],
 ans:2,
 en:'MIDI files store instructions (not sound data), making them far smaller — they load and stream much faster on the web.',
 ar:'ملفات MIDI تخزن تعليمات (وليس بيانات صوتية)، مما يجعلها أصغر بكثير — تحمّل وتبث بسرعة أكبر على الويب.'},

{id:138,ch:'CH6',type:'MCQ',
 q:'Which is a key DISADVANTAGE of MIDI?',
 opts:['Cannot be embedded in web pages','Playback quality depends on the hardware device (device-dependent)','Requires twice the storage of digital audio','Cannot store musical notes'],
 ans:1,
 en:'MIDI is device-dependent: the same file may sound completely different on different hardware because each device has its own synthesizer.',
 ar:'MIDI يعتمد على الجهاز: نفس الملف قد يُصدر صوتاً مختلفاً تماماً على أجهزة مختلفة لأن كل جهاز لديه محاكيه الصوتي الخاص.'},

{id:139,ch:'CH6',type:'MCQ',
 q:'The CD-quality audio Red Book Standard (ISO 10149) uses:',
 opts:['8-bit samples at 22.05 kHz','16-bit samples at 44.1 kHz','32-bit samples at 96 kHz','8-bit samples at 44.1 kHz'],
 ans:1,
 en:'The Red Book Standard defines CD-quality audio as 16-bit samples at 44.1 kHz, accurately reproducing all human-audible frequencies.',
 ar:'معيار Red Book يُحدد جودة CD بعينات 16-bit بمعدل 44.1 kHz، يتسم بدقة جميع الترددات المسموعة بشرياً.'},

{id:140,ch:'CH6',type:'MCQ',
 q:'"Quantization" in digital audio means:',
 opts:['Increasing the sampling frequency','Rounding each sample\'s amplitude to the nearest integer','Removing background noise','Converting MIDI to digital audio'],
 ans:1,
 en:'Quantization rounds the measured amplitude of each sample to the nearest representable integer, introducing a small rounding error called quantization noise.',
 ar:'الـ Quantization يُقرِّب قيمة شدة كل عينة إلى أقرب عدد صحيح قابل للتمثيل، مما يُدخل خطأ تقريب صغيراً.'},

{id:141,ch:'CH6',type:'MCQ',
 q:'"Downsampling" is used primarily to:',
 opts:['Improve audio fidelity','Reduce file size by lowering the number of samples per second','Convert mono to stereo','Add fade effects'],
 ans:1,
 en:'Downsampling reduces the number of samples per second, creating smaller files at the cost of some audio quality reduction.',
 ar:'الـ Downsampling يُقلل عدد العينات في الثانية، مما ينتج ملفات أصغر على حساب جزء من جودة الصوت.'},

{id:142,ch:'CH6',type:'MCQ',
 q:'According to Vaughn\'s Law of Minimums, inexpensive equipment is acceptable when:',
 opts:['Only for beginners','It meets an adequate quality level satisfying you and your audience','Only for MIDI, not digital audio','The project has no deadline'],
 ans:1,
 en:'Vaughn\'s Law: there is an acceptable minimum quality level. If cheap equipment satisfies the audience, there is no need to spend more.',
 ar:'قانون Vaughn: يوجد مستوى أدنى مقبول من الجودة. إذا كان الجهاز الرخيص يُرضي الجمهور، لا داعي للإنفاق أكثر.'},

{id:143,ch:'CH6',type:'MCQ',
 q:'Which audio file format does Windows use for system sounds?',
 opts:['AIFF','MIDI','WAV','MP3 only'],
 ans:2,
 en:'Windows stores system sounds as WAV files in the Windows\\Media directory. Macintosh uses AIFF or AIFC formats.',
 ar:'Windows يخزن أصوات النظام كملفات WAV في مجلد Windows\\Media. Mac يستخدم صيغة AIFF أو AIFC.'},

{id:144,ch:'CH6',type:'MCQ',
 q:'To reproduce spoken dialog in a multimedia project you should use:',
 opts:['MIDI','Digital audio','Both are equally suitable','Neither; use text-to-speech only'],
 ans:1,
 en:'MIDI represents musical instruments and cannot easily reproduce human speech. Digital audio directly records any sound including speech.',
 ar:'MIDI مُصمَّم للآلات الموسيقية ولا يمكنه بسهولة استنساخ الكلام البشري. الصوت الرقمي يُسجِّل أي صوت مباشرةً بما فيه الكلام.'},

{id:145,ch:'CH6',type:'MCQ',
 q:'Digital audio is described as "device-independent" because:',
 opts:['It plays only on dedicated hardware','The same recording sounds identical on any playback hardware','It does not need a sound card','It compresses automatically on any device'],
 ans:1,
 en:'Digital audio stores the actual sound wave as samples, so playback is consistent (same sound) regardless of the hardware used.',
 ar:'الصوت الرقمي يخزن الموجة الصوتية الفعلية كعينات، فيثبت التشغيل (نفس الصوت) بغض النظر عن الأجهزة.'},

{id:146,ch:'CH6',type:'MCQ',
 q:'MIDI is analogous to which type of graphic?',
 opts:['Bitmapped (raster)','Vector','RAW','TIFF'],
 ans:1,
 en:'Like vector graphics storing math equations to recreate images, MIDI stores numeric instructions to recreate music — both are compact and scalable.',
 ar:'مثلما تخزن الرسوميات المتجهة معادلات رياضية لإعادة إنشاء الصور، يخزن MIDI تعليمات رقمية لإعادة إنشاء الموسيقى — كلاهما مدمج وقابل للتوسع.'},

{id:147,ch:'CH6',type:'MCQ',
 q:'Streaming audio means:',
 opts:['Waiting for the full file to download before playing','Playing audio while it is still being downloaded','Converting audio to a text-based stream','Playing audio in reverse'],
 ans:1,
 en:'Streaming buffers and plays audio as it downloads, avoiding long wait times. Playback quality depends on connection speed.',
 ar:'الـ Streaming يخزن الصوت في Buffer ويُشغِّله أثناء التحميل، متجنباً أوقات انتظار طويلة. تتوقف الجودة على سرعة الاتصال.'},

{id:148,ch:'CH6',type:'MCQ',
 q:'Stereo audio requires how much storage compared to mono?',
 opts:['Same amount','25% more','Twice as much','Four times as much'],
 ans:2,
 en:'Stereo uses two channels (left + right), exactly doubling the storage requirement compared to mono (one channel).',
 ar:'الـ Stereo يستخدم قناتين (يسار + يمين)، يضاعف متطلبات التخزين بالضبط مقارنةً بـ Mono (قناة واحدة).'},

{id:149,ch:'CH6',type:'MCQ',
 q:'Which scripting language is native to Macromedia Director?',
 opts:['ActionScript','Open Script','LINGO','JavaScript'],
 ans:2,
 en:'LINGO is Director\'s native scripting language. ActionScript is for Flash; Open Script is for Toolbook.',
 ar:'LINGO هي لغة البرمجة النصية الخاصة بـ Director. ActionScript: لـ Flash. Open Script: لـ Toolbook.'},

// CH6 True/False
{id:150,ch:'CH6',type:'TF',
 q:'MIDI audio sounds identical on all playback devices.',
 opts:['True','False'],
 ans:1,
 en:'FALSE — MIDI is device-dependent: playback quality varies based on the sound synthesizer of each device. Digital audio is device-independent.',
 ar:'خطأ — MIDI يعتمد على الجهاز: تختلف جودة التشغيل حسب المحاكي الصوتي لكل جهاز. الصوت الرقمي مستقل عن الجهاز.'},

{id:151,ch:'CH6',type:'TF',
 q:'A higher sampling rate produces better audio quality.',
 opts:['True','False'],
 ans:0,
 en:'TRUE — A higher sampling rate captures more detail per second, more accurately representing the original sound wave.',
 ar:'صحيح — معدل أخذ عينات أعلى يلتقط تفاصيل أكثر في الثانية، مما يمثل الموجة الصوتية الأصلية بدقة أكبر.'},

{id:152,ch:'CH6',type:'TF',
 q:'MIDI files are generally larger than digital audio files of the same music.',
 opts:['True','False'],
 ans:1,
 en:'FALSE — MIDI files are much SMALLER: they store instructions (like sheet music), not actual sound data.',
 ar:'خطأ — ملفات MIDI أصغر بكثير: تخزن تعليمات (مثل النوتة الموسيقية)، وليس بيانات صوتية فعلية.'},

{id:153,ch:'CH6',type:'TF',
 q:'Infrasound has frequencies above 20 kHz.',
 opts:['True','False'],
 ans:1,
 en:'FALSE — Infrasound is 0–20 Hz (BELOW human hearing). Ultrasound is above 20 kHz (ABOVE human hearing).',
 ar:'خطأ — الـ Infrasound هو 0-20 Hz (دون السمع البشري). الـ Ultrasound هو فوق 20 kHz (فوق السمع البشري).'},

{id:154,ch:'CH6',type:'TF',
 q:'Digital audio provides consistent, device-independent playback.',
 opts:['True','False'],
 ans:0,
 en:'TRUE — Digital audio stores the actual sound wave as samples, ensuring identical playback on any hardware.',
 ar:'صحيح — الصوت الرقمي يخزن الموجة الصوتية الفعلية كعينات، مما يضمن تشغيلاً متطابقاً على أي جهاز.'},

{id:155,ch:'CH6',type:'TF',
 q:'You may freely use any music in your multimedia project without permission.',
 opts:['True','False'],
 ans:1,
 en:'FALSE — Copyright law requires permission to use others\' original works. Royalty-free sound clips can be purchased legally.',
 ar:'خطأ — قانون حقوق الملكية الفكرية يشترط الإذن لاستخدام أعمال الآخرين. يمكن شراء مقاطع صوتية خالية من الحقوق بشكل قانوني.'},

{id:156,ch:'CH6',type:'TF',
 q:'Increasing bit depth from 8-bit to 16-bit reduces audio file size.',
 opts:['True','False'],
 ans:1,
 en:'FALSE — Increasing bit depth INCREASES file size because more bits are stored per sample, capturing a wider dynamic range.',
 ar:'خطأ — زيادة عمق البت تزيد حجم الملف لأن بتات أكثر تُخزَّن لكل عينة، ملتقطةً نطاقاً ديناميكياً أوسع.'},

{id:157,ch:'CH6',type:'TF',
 q:'MIDI requires knowledge of music theory to produce effectively.',
 opts:['True','False'],
 ans:0,

{id:158,ch:'CH7',type:'MCQ',

{id:159,ch:'CH7',type:'MCQ',

{id:160,ch:'CH7',type:'MCQ',

{id:161,ch:'CH7',type:'MCQ',

{id:162,ch:'CH7',type:'MCQ',
 q:'The main DISADVANTAGE of bitmap graphics is:',

{id:163,ch:'CH7',type:'MCQ',
 q:'The main ADVANTAGE of vector graphics is:',

{id:164,ch:'CH7',type:'MCQ',
 q:'Interlacing a video display means:',

{id:165,ch:'CH7',type:'MCQ',

{id:166,ch:'CH7',type:'MCQ',

{id:167,ch:'CH7',type:'MCQ',

{id:168,ch:'CH7',type:'MCQ',

{id:169,ch:'CH7',type:'MCQ',

{id:170,ch:'CH7',type:'MCQ',

{id:171,ch:'CH7',type:'MCQ',

{id:186,ch:'CH7',type:'TF',

{id:187,ch:'CH5',type:'PROB',
 q:'A developer writes a compound identifier "userprofile". Rewrite it using intercap convention and explain why this is preferred in programming.',
 sol:`✅ Answer: UserProfile\n\nCapitalize the first letter of each word component.\n\nWhy: Intercap improves readability when spaces are not allowed — as in variable names, class names, and URLs. Without intercap, "userprofile" is harder to parse at a glance.\n\nOther valid forms: userProfile (camelCase) for variables, UserProfile (PascalCase) for class names.`,
 ar:`الإجابة: UserProfile\n\nنكبّر الحرف الأول من كل جزء من المعرّف المركّب.\n\nالسبب: الـ Intercap يحسّن القراءة حيث لا تُسمح المسافات — كأسماء المتغيرات والفئات وعناوين URL. بدونه، "userprofile" أصعب للفهم بنظرة واحدة.`},

{id:188,ch:'CH5',type:'PROB',
 q:'Explain the difference between kerning and leading, and give one practical scenario where each needs to be adjusted.',
 sol:`KERNING — Horizontal space between specific letter pairs.\nScenario: A heading with "AV" — the letters appear too far apart visually. Reduce kerning to close the gap and improve readability.\n\nLEADING — Vertical line spacing between rows of text.\nScenario: A dense block of body text feels cramped and hard to read. Increase leading to add breathing room between lines.`,
 ar:`KERNING — المسافة الأفقية بين زوج محدد من الحروف.\nمثال: عنوان فيه "AV" — الحروف تبدو متباعدة بصرياً؛ نقلّل الكيرنينج لتقريبها.\n\nLEADING — مسافة الأسطر الرأسية بين صفوف النص.\nمثال: فقرة كثيفة النص تبدو مضغوطة؛ نزيد الـ Leading لإضافة مسافة بين السطور.`},

{id:189,ch:'CH5',type:'PROB',
 q:'A multimedia project will be viewed on both Mac and PC. The designer used a custom font. What problem may arise and how can it be avoided?',
 sol:`Problem: Font Substitution\nIf the custom font is not installed on the viewer's machine, the OS replaces it with a different font, altering layout, spacing, and visual appearance.\n\nSolutions:\n1. Convert text to bitmaps/outlines before distributing.\n2. Use common cross-platform fonts (e.g. Arial, Times New Roman, Verdana).\n3. Embed the font in the document or package where possible.\n4. Use web-safe fonts or hosted font services (e.g. Google Fonts) for web projects.`,
 ar:`المشكلة: استبدال الخط (Font Substitution)\nإذا لم يكن الخط المخصص مثبتاً على جهاز المشاهد، يستبدله نظام التشغيل بخط مختلف مما يغيّر التخطيط والمسافات والمظهر البصري.\n\nالحلول:\n1. حوّل النص إلى bitmap أو outlines قبل التوزيع.\n2. استخدم خطوطاً مشتركة بين المنصات (Arial، Times، Verdana).\n3. ضمّن الخط في الوثيقة حيثما أمكن.\n4. استخدم خطوط الويب الآمنة أو خدمات مستضافة (مثل Google Fonts).`},

{id:190,ch:'CH6',type:'PROB',
 q:'Calculate the uncompressed file size (in KB) of a MONO digital audio recording at 22.05 kHz, 16-bit resolution, for 10 seconds.',
 sol:`Formula (Mono):\nSize = Sampling Rate × Duration × (Bit Depth ÷ 8)\n\nCalculation:\n= 22,050 × 10 × (16 ÷ 8)\n= 22,050 × 10 × 2\n= 441,000 bytes\n= 441,000 ÷ 1,024\n≈ 430.7 KB`,
 ar:`المعادلة (Mono):\nالحجم = معدل العينات × المدة × (عمق البت ÷ 8)\n\nالحساب:\n= 22,050 × 10 × (16 ÷ 8)\n= 22,050 × 10 × 2\n= 441,000 بايت\n= 441,000 ÷ 1,024\n≈ 430.7 KB`},

{id:191,ch:'CH6',type:'PROB',
 q:'Calculate the file size (in MB) for STEREO digital audio at CD quality (44.1 kHz, 16-bit) for 30 seconds.',
 sol:`Formula (Stereo):\nSize = Sampling Rate × Duration × (Bit Depth ÷ 8) × 2 channels\n\nCalculation:\n= 44,100 × 30 × (16 ÷ 8) × 2\n= 44,100 × 30 × 2 × 2\n= 5,292,000 bytes\n= 5,292,000 ÷ 1,048,576\n≈ 5.04 MB`,
 ar:`المعادلة (Stereo):\nالحجم = معدل العينات × المدة × (عمق البت ÷ 8) × 2 قناة\n\nالحساب:\n= 44,100 × 30 × (16 ÷ 8) × 2\n= 44,100 × 30 × 2 × 2\n= 5,292,000 بايت\n= 5,292,000 ÷ 1,048,576\n≈ 5.04 MB`},

{id:192,ch:'CH6',type:'PROB',
 q:'You are building a website with background music. Bandwidth is limited and you have no control over user hardware. Choose MIDI or Digital Audio and justify your choice.',
 sol:`Best Choice: MIDI\n\nReasons:\n1. MIDI files are far smaller (store instructions, not sound data) → loads much faster on limited bandwidth.\n2. For background music (not speech), MIDI quality is sufficient.\n3. Background music does not require perfect fidelity — slight device-to-device variation is acceptable.\n\nTrade-off: If precise sound quality is critical or spoken dialog is required, switch to Digital Audio because MIDI cannot reproduce speech and is device-dependent.`,
 ar:`الاختيار الأفضل: MIDI\n\nالأسباب:\n1. ملفات MIDI أصغر بكثير (تخزّن تعليمات لا بيانات صوتية) → تُحمَّل بسرعة أعلى مع عرض النطاق المحدود.\n2. للموسيقى الخلفية (ليس الكلام)، جودة MIDI كافية.\n3. الموسيقى الخلفية لا تستلزم دقة كاملة — الاختلاف البسيط بين الأجهزة مقبول.\n\nالمقايضة: إذا كانت الجودة الصوتية الدقيقة ضرورية أو يوجد كلام بشري، استخدم Digital Audio لأن MIDI لا يمكنه إعادة إنتاج الكلام وهو يعتمد على الجهاز.`},

{id:193,ch:'CH7',type:'PROB',
 q:'Calculate the uncompressed size (in KB) of a 100×100 pixel image with 8-bit pixel depth.',
 sol:`Formula:\nSize = Width × Height × (Bit Depth ÷ 8)\n\nCalculation:\n= 100 × 100 × (8 ÷ 8)\n= 100 × 100 × 1\n= 10,000 bytes\n= 10,000 ÷ 1,024\n≈ 9.77 KB  (≈ 10 KB)`,
 ar:`المعادلة:\nالحجم = العرض × الارتفاع × (عمق البت ÷ 8)\n\nالحساب:\n= 100 × 100 × (8 ÷ 8)\n= 100 × 100 × 1\n= 10,000 بايت\n= 10,000 ÷ 1,024\n≈ 9.77 KB  (≈ 10 KB)`},

{id:194,ch:'CH7',type:'PROB',
 q:'A 24-bit RGB image has a resolution of 800×600 pixels. Calculate the uncompressed file size in MB.',
 sol:`Formula:\nSize = Width × Height × (Bit Depth ÷ 8)\n24-bit = 3 bytes per pixel (1 byte each for R, G, B)\n\nCalculation:\n= 800 × 600 × 3\n= 1,440,000 bytes\n= 1,440,000 ÷ 1,048,576\n≈ 1.37 MB`,
 ar:`المعادلة:\nالحجم = العرض × الارتفاع × (عمق البت ÷ 8)\n24-بت = 3 بايت لكل بيكسل (1 بايت لكل من R، G، B)\n\nالحساب:\n= 800 × 600 × 3\n= 1,440,000 بايت\n= 1,440,000 ÷ 1,048,576\n≈ 1.37 MB`},

{id:195,ch:'CH7',type:'PROB',
 q:'Apply Run-Length Encoding (RLE) to: BBBBWWWYYYYYYGGGGYYYYYYY\nShow the encoded output, count the pairs, and calculate the compression ratio.',
 sol:`Original string: BBBBWWWYYYYYYGGGGYYYYYYY\nLength: 23 characters\n\nRLE Encoded Output:\n(B,4) (W,3) (Y,6) (G,4) (Y,7)\n= 5 pairs = 10 symbols\n\nCompression Ratio = 23 ÷ 10 = 2.3 : 1\n≈ 57% size reduction\n\nNote: Each pair = (color, count) = 2 symbols.`,
 ar:`السلسلة الأصلية: BBBBWWWYYYYYYGGGGYYYYYYY\nالطول: 23 حرفاً\n\nالمشفَّر بـ RLE:\n(B,4) (W,3) (Y,6) (G,4) (Y,7)\n= 5 أزواج = 10 رموز\n\nنسبة الضغط = 23 ÷ 10 = 2.3 : 1\n≈ تخفيض الحجم بـ 57%\n\nملاحظة: كل زوج = (اللون، العدد) = رمزان.`},

{id:196,ch:'CH7',type:'PROB',
 q:'Given Huffman codes: A=010, B=1, C=000, D=011, E=001\nProbabilities: p(A)=0.16, p(B)=0.51, p(C)=0.09, p(D)=0.13, p(E)=0.11\nCalculate the average code length and compare to ASCII (8-bit fixed) for 1000 characters.',
 sol:`Average Code Length = Σ (code_length × probability)\n= (3×0.16) + (1×0.51) + (3×0.09) + (3×0.13) + (3×0.11)\n= 0.48 + 0.51 + 0.27 + 0.39 + 0.33\n= 1.98 bits/symbol\n\nFor 1,000 characters:\n• Huffman: 1,000 × 1.98 = 1,980 bits = 248 bytes\n• ASCII:   1,000 × 8   = 8,000 bits = 1,000 bytes\n\nSaving: ~75% reduction in storage compared to ASCII.`,
 ar:`متوسط طول الرمز = مجموع (طول الرمز × الاحتمالية)\n= (3×0.16) + (1×0.51) + (3×0.09) + (3×0.13) + (3×0.11)\n= 0.48 + 0.51 + 0.27 + 0.39 + 0.33\n= 1.98 بت/رمز\n\nلـ 1,000 حرف:\n• Huffman: 1,000 × 1.98 = 1,980 بت = 248 بايت\n• ASCII:   1,000 × 8   = 8,000 بت = 1,000 بايت\n\nالتوفير: ~75% تخفيض في التخزين مقارنةً بـ ASCII.`},

{id:197,ch:'CH7',type:'PROB',
 q:'Calculate the storage required for 1 minute of uncompressed RGB video at 100×100 resolution, 24 frames per second.',
 sol:`Formula:\nSize = Width × Height × 3 bytes × FPS × Seconds\n\nCalculation:\n= 100 × 100 × 3 × 24 × 60\n= 43,200,000 bytes\n= 43,200,000 ÷ 1,048,576\n≈ 41.2 MB\n\nThis shows why video compression (MPEG, H.264) is essential — even tiny 100×100 video at 24fps for 1 minute needs ~41 MB uncompressed.`,
 ar:`المعادلة:\nالحجم = العرض × الارتفاع × 3 بايت × إطار/ثانية × الثواني\n\nالحساب:\n= 100 × 100 × 3 × 24 × 60\n= 43,200,000 بايت\n= 43,200,000 ÷ 1,048,576\n≈ 41.2 MB\n\nهذا يوضّح لماذا ضغط الفيديو (MPEG, H.264) ضروري — حتى فيديو صغير 100×100 بـ 24 إطار/ثانية لدقيقة واحدة يحتاج ~41 MB بدون ضغط.`},
];

// ── STATE ──
let state = {};
let currentFilter='all', currentChapter='all', currentSearch='';

function getQ(id){ return QUESTIONS.find(q=>q.id===id); }

// ── RENDER ──
function render(){
  const wrap = document.getElementById('questionsWrap');
  let filtered = QUESTIONS.filter(q=>{
    let show=true;
    if(currentChapter!=='all') show=show&&q.ch===currentChapter;
    if(currentSearch) show=show&&q.q.toLowerCase().includes(currentSearch.toLowerCase());
    if(currentFilter==='wrong') show=show&&state[q.id]==='wrong';
    if(currentFilter==='correct') show=show&&state[q.id]==='correct';
    if(currentFilter==='unanswered') show=show&&!state[q.id]&&q.type!=='PROB';
    if(currentFilter==='prob') show=show&&q.type==='PROB';
    return show;
  });
  if(!filtered.length){
    wrap.innerHTML=`<div class="empty-state"><div class="big">🔍</div><p>No questions match your filter</p></div>`;
    updateScore(); return;
  }
  // Group by chapter for dividers
  const chapterInfo={
    CH0:{icon:'🌐',title:'Chapter 0 — Introduction to Multimedia',sub:'HTTP · URI · HTML · VR · Linear vs Nonlinear · CD/DVD'},
    CH1:{icon:'🎬',title:'Chapter 1 — Overview of Multimedia',sub:'Definition · Elements · Types · Applications'},
    CH2:{icon:'💻',title:'Chapter 2 — Multimedia Systems & Hardware',sub:'Capture · Storage · Networks · Display'},
    CH3:{icon:'🎨',title:'Chapter 3 — Making Multimedia',sub:'4 Stages · Planning · Hardware · Software · Prototype'},
    CH4:{icon:'👥',title:'Chapter 4 — Multimedia Team Roles',sub:'Project Manager · Designer · Programmer · Audio · Interface'},
    TF:{icon:'✅',title:'True / False — Chapters 0–4',sub:'Critical statements from every chapter for the final exam'},
    CH5:{icon:'🔤',title:'Chapter 5 — Text in Multimedia',sub:'Typeface · Font · Kerning · Leading · Unicode · Hypertext · WYSIWYG · Anti-aliasing'},
    CH6:{icon:'🔊',title:'Chapter 6 — Sound in Multimedia',sub:'Acoustics · MIDI · Digital Audio · Sampling · File Formats · Copyright'},
    CH7:{icon:'🖼️',title:'Chapter 7 — Graphic / Image Data Structures',sub:'Pixel · Resolution · Bit Depth · Bitmap · Vector · RGB · RLE · Huffman · JPEG · GIF'},
  };
  let html=''; let lastCh='';
  filtered.forEach((q,i)=>{
    if(q.ch!==lastCh && currentChapter==='all'){
      const info=chapterInfo[q.ch]||{icon:'📚',title:q.ch,sub:''};
      const chCount=filtered.filter(x=>x.ch===q.ch).length;
      const anchorId={'CH0':'ch0','CH1':'ch1','CH2':'ch2','CH3':'ch3','CH4':'ch4','TF':'tfSection','CH5':'ch5','CH6':'ch6','CH7':'ch7'}[q.ch]||q.ch.toLowerCase();
      html+=`<div class="ch-divider" id="${anchorId}">
        <div class="ch-header">
          <div class="ch-icon">${info.icon}</div>
          <div><div class="ch-title">${info.title}</div><div class="ch-sub">${info.sub}</div></div>
          <span class="ch-count">${chCount} Q</span>
        </div>
      </div>`;
      lastCh=q.ch;
    }
    html+=buildCard(q,i);
  });
  wrap.innerHTML=html;
  updateScore();
}

function buildProbCard(q,idx){
  const chLabels={CH0:'Ch.0 · Intro',CH1:'Ch.1 · Overview',CH2:'Ch.2 · Systems',CH3:'Ch.3 · Making MM',CH4:'Ch.4 · Team',TF:'True / False',CH5:'Ch.5 · Text',CH6:'Ch.6 · Sound',CH7:'Ch.7 · Graphics'};
  const solLines = (q.sol||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const arLines  = (q.ar||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<div class="prob-card" id="qcard-${q.id}" style="animation-delay:${Math.min(idx,20)*35}ms">
    <div class="prob-header">
      <div class="prob-num">${q.id}</div>
      <div style="flex:1">
        <span class="prob-type-tag">🧮 Problem Solving</span><span class="q-chapter-tag">${chLabels[q.ch]||q.ch}</span>
        <div class="prob-q">${q.q.replace(/\n/g,'<br>')}</div>
      </div>
    </div>
    <button class="prob-toggle" onclick="toggleSol(${q.id},this)">▶ Show Solution &amp; Explanation</button>
    <div class="prob-solution" id="probsol-${q.id}">
      <div class="prob-sol-body">
        <div class="sol-label">✅ Solution</div>
        <div class="sol-en">${solLines}</div>
        <div class="sol-ar"><div class="sol-ar-lbl">Arabic — الشرح</div>${arLines}</div>
      </div>
    </div>
  </div>`;
}

function toggleSol(id,btn){
  const sol=document.getElementById('probsol-'+id);
  const shown=sol.classList.toggle('show');
  btn.textContent=shown?'▼ Hide Solution':'▶ Show Solution & Explanation';
}

function buildCard(q,idx){
  if(q.type==='PROB') return buildProbCard(q,idx);
  const answered=state[q.id];
  const cardClass=answered==='correct'?'answered-correct':answered==='wrong'?'answered-wrong':'';
  const numClass=answered==='correct'?'correct-num':answered==='wrong'?'wrong-num':'';
  const chLabels={CH0:'Ch.0 · Intro',CH1:'Ch.1 · Overview',CH2:'Ch.2 · Systems',CH3:'Ch.3 · Making MM',CH4:'Ch.4 · Team',TF:'True / False',CH5:'Ch.5 · Text',CH6:'Ch.6 · Sound',CH7:'Ch.7 · Graphics'};
  const typeBadge=q.type==='TF'?`<span class="q-type-tag">T/F</span>`:`<span class="q-type-tag">MCQ</span>`;

  const opts=q.opts.map((o,i)=>{
    let cls='option';
    if(answered){
      cls+=' disabled';
      if(i===q.ans) cls+=' correct-opt';
      else if(answered==='wrong'&&i===q._selected) cls+=' wrong-opt';
    }
    const letter=q.type==='TF'?(i===0?'T':'F'):'ABCD'[i];
    return `<div class="${cls}" ${!answered?`onclick="answer(${q.id},${i})"`:''}><span class="option-letter">${letter}</span>${o}</div>`;
  }).join('');

  let fbHtml='';
  if(answered){
    const isC=answered==='correct';
    fbHtml=`<div class="feedback ${isC?'correct-fb':'wrong-fb'} show">
      <div class="fb-header ${isC?'fb-correct-head':'fb-wrong-head'}">${isC?'✅ Correct! Great job! 🎉':'❌ Wrong Answer'}</div>
      ${!isC?`<div class="fb-correct-ans">✅ Correct Answer: ${q.opts[q.ans]}</div>`:''}
      <div class="fb-en">${q.en}</div>
      <div class="fb-ar"><div class="fb-ar-lbl">Arabic — الشرح</div>${q.ar}</div>
    </div>`;
  }

  return `<div class="q-card ${cardClass}" id="qcard-${q.id}" style="animation-delay:${Math.min(idx,20)*35}ms">
    <div class="q-header">
      <div class="q-num ${numClass}">${q.id}</div>
      <div style="flex:1">
        ${typeBadge}<span class="q-chapter-tag">${chLabels[q.ch]||q.ch}</span>
        <div class="q-text">${q.q}</div>
      </div>
    </div>
    <div class="options">${opts}</div>
    ${fbHtml}
  </div>`;
}

function answer(qId,optIdx){
  const q=getQ(qId);
  q._selected=optIdx;
  state[qId]=optIdx===q.ans?'correct':'wrong';
  const tmp=document.createElement('div');
  tmp.innerHTML=buildCard(q,0);
  document.getElementById('qcard-'+qId).replaceWith(tmp.firstElementChild);
  updateScore();
}

// ── SCORE ──
function updateScore(){
  const scorable=QUESTIONS.filter(q=>q.type!=='PROB');
  const total=scorable.length;
  const correct=Object.values(state).filter(v=>v==='correct').length;
  const wrong=Object.values(state).filter(v=>v==='wrong').length;
  const answered=correct+wrong;
  const skip=total-answered;
  const pct=answered?Math.round(correct/answered*100):0;
  document.getElementById('countCorrect').textContent=correct;
  document.getElementById('countWrong').textContent=wrong;
  document.getElementById('countSkip').textContent=skip;
  document.getElementById('countTotal').textContent=total;
  document.getElementById('scorePct').textContent=pct+'%';
  document.getElementById('progFill').style.width=(answered/total*100)+'%';
  document.getElementById('msC').textContent=correct;
  document.getElementById('msW').textContent=wrong;
  document.getElementById('msT').textContent=total;
  const circ=283, offset=circ-(pct/100*circ);
  document.getElementById('ringFill').style.strokeDashoffset=offset;
  document.getElementById('ringFill').style.stroke=pct>=80?'var(--green)':pct>=60?'var(--accent)':pct>=40?'var(--gold)':'var(--red)';
}

// ── FILTERS ──
function filterCat(cat,btn){
  currentFilter=cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function filterChapter(val){currentChapter=val;render();}
function searchQ(val){currentSearch=val;render();}

// ── RESET ──
function resetAll(){
  QUESTIONS.forEach(q=>{delete q._selected});
  state={};
  render();
}

// ── SHUFFLE ──
function shuffleQuestions(){
  for(let i=QUESTIONS.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [QUESTIONS[i],QUESTIONS[j]]=[QUESTIONS[j],QUESTIONS[i]];
  }
  render();
}

// ── MODAL ──
function showResults(){
  const total=QUESTIONS.length;
  const correct=Object.values(state).filter(v=>v==='correct').length;
  const wrong=Object.values(state).filter(v=>v==='wrong').length;
  const skip=total-correct-wrong;
  const pct=correct+wrong?Math.round(correct/(correct+wrong)*100):0;
  document.getElementById('mCorrect').textContent=correct;
  document.getElementById('mWrong').textContent=wrong;
  document.getElementById('mSkip').textContent=skip;
  let grade,emoji,msg;
  if(pct>=90){grade='A';emoji='🏆';msg='ممتاز جداً! أنت مستعد للفاينل بكل ثقة 💪';}
  else if(pct>=80){grade='A';emoji='🎯';msg='ممتاز! راجع الأخطاء البسيطة وستكون مثالياً.';}
  else if(pct>=70){grade='B';emoji='👍';msg='جيد جداً! راجع الأسئلة الغلط وستحقق أفضل.';}
  else if(pct>=60){grade='C';emoji='📚';msg='جيد، لكن تحتاج مراجعة أكثر للفصول الضعيفة.';}
  else{grade='D';emoji='💡';msg='تحتاج مراجعة أقوى. راجع Study Guide ثم حاول مجدداً.';}
  document.getElementById('modalGrade').textContent=pct+'%';
  document.getElementById('modalGrade').className='grade '+grade;
  document.getElementById('modalEmoji').textContent=emoji;
  document.getElementById('modalMsg').textContent=msg;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});

// ── CANVAS ──
const canvas=document.getElementById('bg-canvas');
const ctx=canvas.getContext('2d');
let W,H,pts=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
function initPts(){pts=Array.from({length:90},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.28,vy:(Math.random()-.5)*.28,r:Math.random()*1.4+.3,o:Math.random()*.35+.07}));}
function draw(){
  ctx.clearRect(0,0,W,H);
  pts.forEach(p=>{
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(45,255,127,${p.o})`;ctx.fill();
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0||p.x>W)p.vx*=-1;
    if(p.y<0||p.y>H)p.vy*=-1;
  });
  for(let i=0;i<pts.length;i++){
    for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<100){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(45,255,127,${.055*(1-d/100)})`;ctx.lineWidth=.5;ctx.stroke();}
    }
  }
  requestAnimationFrame(draw);
}
resize();initPts();draw();
window.addEventListener('resize',()=>{resize();initPts();});

// ── INIT ──
render();
updateScore();
</script>
